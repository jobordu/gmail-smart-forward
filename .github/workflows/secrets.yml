name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets
        run: |
          detect-secrets scan --exclude-files 'node_modules/.*|\.secrets\.baseline' --baseline .secrets.baseline
          CHANGES=$(git diff .secrets.baseline | grep '^[+-]' | grep -v '^[+-]\{3\}' | { grep -v 'generated_at' || true; })
          if [ -n "$CHANGES" ]; then
            echo "::error::New secrets detected! Update the baseline locally:"
            echo "::error::  detect-secrets scan --exclude-files 'node_modules/.*' --baseline .secrets.baseline"
            git diff .secrets.baseline
            exit 1
          fi

  secrets:
    needs: [gitleaks, trufflehog, detect-secrets]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.gitleaks.result }}" != "success" ] || \
             [ "${{ needs.trufflehog.result }}" != "success" ] || \
             [ "${{ needs.detect-secrets.result }}" != "success" ]; then
            exit 1
          fi
